<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TP-7 Absolute Tape Core</title>
    <style>
        body {
            background-color: #161616;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .layout-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            transition: all 0.3s ease;
        }

        .container.mobile-mode {
            flex-direction: column-reverse;
            gap: 20px;
        }
        .container.mobile-mode .side-buttons {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 320px;
        }
        .container.mobile-mode button {
            min-width: 90px;
            padding: 10px 10px;
            font-size: 0.8rem;
        }

        .side-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            min-width: 120px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.1s;
        }
        button:active {
            background-color: #444;
        }
        button.active {
            background-color: #ff5500;
            border-color: #ff7733;
        }
        .wheel-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        #wheel {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, #2d2d2d 30%, #1a1a1a 70%, #0a0a0a 100%);
            border: 6px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            touch-action: none;
        }
        #marker {
            width: 16px;
            height: 16px;
            background-color: #ff5500;
            border-radius: 50%;
            position: absolute;
            top: 15px;
        }

        /* Odometer Rolling Digital Screen UI */
        .odometer-container {
            background-color: #000;
            border: 2px solid #333;
            border-radius: 6px;
            padding: 8px 16px;
            display: flex;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            overflow: hidden;
            height: 36px;
            line-height: 36px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
        }
        .digit-slot {
            position: relative;
            width: 20px;
            height: 36px;
            overflow: hidden;
            text-align: center;
        }
        .digit-strip {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .digit-strip span {
            display: block;
            height: 36px;
        }
        .colon {
            padding: 0 2px;
        }

        #status {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #666;
            font-family: monospace;
            text-align: center;
        }
        #fileInputContainer {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="layout-bar">
        <span>Screen Mode:</span>
        <button id="btnToggleLayout" style="min-width: auto; padding: 6px 12px; font-size: 0.8rem;">Switch to Mobile UI</button>
    </div>

    <div id="fileInputContainer">
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <div class="container" id="mainContainer">
        <div class="side-buttons">
            <button id="btnPlay">PLAY</button>
            <button id="btnPause">PAUSE</button>
            <button id="btnFF">FFWD</button>
            <button id="btnRW">REWIND</button>
            <button id="btnFree">FREE SPIN</button>
        </div>

        <div class="wheel-area">
            <div class="odometer-container">
                <div class="digit-slot"><div class="digit-strip" id="h1"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
                <div class="digit-slot"><div class="digit-strip" id="h2"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
                <span class="colon">:</span>
                <div class="digit-slot"><div class="digit-strip" id="m1"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
                <div class="digit-slot"><div class="digit-strip" id="m2"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
                <span class="colon">:</span>
                <div class="digit-slot"><div class="digit-strip" id="s1"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
                <div class="digit-slot"><div class="digit-strip" id="s2"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
            </div>

            <div id="wheel">
                <div id="marker"></div>
            </div>
        </div>
    </div>

    <div id="status">Upload an audio track to clear system defaults.</div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let audioBuffer = null;
        let currentSourceNode = null;
        
        let isPlaying = false;
        let currentPlaybackRate = 1.0;
        let targetPlaybackRate = 1.0;
        let isFreeSpinMode = false;
        let manualSpeedSetting = 1.0;
        
        let trackPlayheadTime = 0; 
        let wheelRotation = 0; 
        let lastAnimationFrameTime = performance.now();
        let nodeStartTimeContext = 0;
        let nodeStartTimePlayhead = 0;

        let isInteracting = false;
        let lastAngle = 0;
        let lastTouchTime = Date.now();

        const container = document.getElementById('mainContainer');
        const wheel = document.getElementById('wheel');
        const status = document.getElementById('status');
        const fileInput = document.getElementById('audioFile');
        
        const btnPlay = document.getElementById('btnPlay');
        const btnPause = document.getElementById('btnPause');
        const btnFF = document.getElementById('btnFF');
        const btnRW = document.getElementById('btnRW');
        const btnFree = document.getElementById('btnFree');
        const btnToggleLayout = document.getElementById('btnToggleLayout');

        btnToggleLayout.addEventListener('click', () => {
            container.classList.toggle('mobile-mode');
            btnToggleLayout.innerText = container.classList.contains('mobile-mode') ? "Switch to PC UI" : "Switch to Mobile UI";
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            status.innerText = "SYS: Parsing file layout...";
            const arrayBuffer = await file.arrayBuffer();
            audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            status.innerText = "SYS: Buffer locked. Operational.";
            trackPlayheadTime = 0;
            updateOdometerDisplay(0);
        });

        function updateAudioEngineNode() {
            if (!audioBuffer || !isPlaying) return;
            
            if (currentSourceNode) {
                try { currentSourceNode.stop(); currentSourceNode.disconnect(); } catch(e){}
            }

            currentSourceNode = audioContext.createBufferSource();
            currentSourceNode.buffer = audioBuffer;
            currentSourceNode.loop = true;
            currentSourceNode.connect(audioContext.destination);
            
            // Absolute boundary control loop logic
            if (trackPlayheadTime < 0) trackPlayheadTime = 0;
            if (trackPlayheadTime > audioBuffer.duration) trackPlayheadTime = 0;

            nodeStartTimePlayhead = trackPlayheadTime;
            nodeStartTimeContext = audioContext.currentTime;
            
            currentSourceNode.start(0, trackPlayheadTime);
            currentSourceNode.playbackRate.setValueAtTime(currentPlaybackRate, audioContext.currentTime);
        }

        // Processing & Rolling Watch Layout Logic
        function animationLoop(now) {
            const deltaTime = (now - lastAnimationFrameTime) / 1000;
            lastAnimationFrameTime = now;

            if (isPlaying && audioBuffer) {
                if (!isInteracting) {
                    currentPlaybackRate += (targetPlaybackRate - currentPlaybackRate) * 0.1;
                    if (currentSourceNode) {
                        currentSourceNode.playbackRate.setValueAtTime(currentPlaybackRate, audioContext.currentTime);
                    }

                    // CRITICAL: Prevent automatic wheel movement completely during Free Spin mode
                    if (!isFreeSpinMode) {
                        const baseSpinSpeed = 2.5; 
                        wheelRotation += baseSpinSpeed * currentPlaybackRate * deltaTime;
                        wheel.style.transform = `rotate(${wheelRotation}rad)`;
                    }

                    const elapsedContextTime = audioContext.currentTime - nodeStartTimeContext;
                    trackPlayheadTime = nodeStartTimePlayhead + (elapsedContextTime * currentPlaybackRate);
                } else {
                    // Manual scrubbing calculations directly increment/decrement playhead
                    if (trackPlayheadTime < 0) trackPlayheadTime = audioBuffer.duration;
                    if (trackPlayheadTime > audioBuffer.duration) trackPlayheadTime = 0;
                }

                updateOdometerDisplay(trackPlayheadTime);
            }

            requestAnimationFrame(animationLoop);
        }
        requestAnimationFrame(animationLoop);

        // Analog Odometer Mechanical Wheel Roller System
        function scrollDigitSlot(elementId, targetValue) {
            const strip = document.getElementById(elementId);
            if (strip) {
                strip.style.transform = `translateY(-${targetValue * 36}px)`;
            }
        }

        function updateOdometerDisplay(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = Math.floor(totalSeconds % 60);

            scrollDigitSlot('h1', Math.floor(hours / 10));
            scrollDigitSlot('h2', hours % 10);
            scrollDigitSlot('m1', Math.floor(minutes / 10));
            scrollDigitSlot('m2', minutes % 10);
            scrollDigitSlot('s1', Math.floor(seconds / 10));
            scrollDigitSlot('s2', seconds % 10);
        }

        btnPlay.addEventListener('click', () => {
            if (!audioBuffer) return;
            audioContext.resume();
            isFreeSpinMode = false;
            btnFree.classList.remove('active');
            isPlaying = true;
            targetPlaybackRate = 1.0;
            currentPlaybackRate = 1.0;
            updateAudioEngineNode();
            status.innerText = "SYS: Playback Normal (1.0x)";
        });

        btnPause.addEventListener('click', () => {
            isPlaying = false;
            targetPlaybackRate = 0.0;
            currentPlaybackRate = 0.0;
            if (currentSourceNode) { try{currentSourceNode.stop();}catch(e){} }
            status.innerText = "SYS: Paused Motor";
        });

        btnFF.addEventListener('click', () => {
            if (!isPlaying) return;
            targetPlaybackRate = 2.0; 
            status.innerText = "SYS: Fast Forwarding (2.0x)";
        });

        btnRW.addEventListener('click', () => {
            if (!isPlaying) return;
            targetPlaybackRate = 0.5; // Fixed slowdown mode requested
            status.innerText = "SYS: Custom Slowdown Track (0.5x)";
        });

        // Toggle Free Spin System Configuration
        btnFree.addEventListener('click', () => {
            if (!isPlaying) return;
            isFreeSpinMode = !isFreeSpinMode;
            
            if (isFreeSpinMode) {
                btnFree.classList.add('active');
                targetPlaybackRate = 0; // Instantly tells the audio process to halt auto-drive
                currentPlaybackRate = 0;
                if (currentSourceNode) currentSourceNode.playbackRate.setValueAtTime(0, audioContext.currentTime);
                status.innerText = "MODE: Free Spin. Wheel dead. Dial speed manually.";
            } else {
                btnFree.classList.remove('active');
                targetPlaybackRate = manualSpeedSetting; 
                updateAudioEngineNode();
                status.innerText = `SYS: Locked active auto-motorized speed at ${targetPlaybackRate.toFixed(2)}x`;
            }
        });

        function getAngle(clientX, clientY) {
            const rect = wheel.getBoundingClientRect();
            return Math.atan2(clientY - (rect.top + rect.height / 2), clientX - (rect.left + rect.width / 2));
        }

        function handleStart(e) {
            if (!audioBuffer || !isPlaying) return;
            audioContext.resume();
            isInteracting = true; 
            const touch = e.touches ? e.touches[0] : e;
            lastAngle = getAngle(touch.clientX, touch.clientY);
            lastTouchTime = Date.now();
        }

        function handleMove(e) {
            if (!isInteracting || !audioBuffer) return;
            
            const touch = e.touches ? e.touches[0] : e;
            const currentAngle = getAngle(touch.clientX, touch.clientY);
            const now = Date.now();
            const deltaTime = (now - lastTouchTime) / 1000;

            if (deltaTime === 0) return;

            let angleDiff = currentAngle - lastAngle;
            if (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
            if (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;

            // Hand directly maps physical wheel rotation placement
            wheelRotation += angleDiff;
            wheel.style.transform = `rotate(${wheelRotation}rad)`;

            const angularVelocity = angleDiff / deltaTime;

            if (isFreeSpinMode) {
                // Clockwise speeds up toward 2.0. Counter-clockwise slows down to 0.0 limit.
                manualSpeedSetting += (angularVelocity * 0.02);
                manualSpeedSetting = Math.max(0.0, Math.min(2.0, manualSpeedSetting));
                
                currentPlaybackRate = manualSpeedSetting;
                if (currentSourceNode) {
                    currentSourceNode.playbackRate.setValueAtTime(currentPlaybackRate, audioContext.currentTime);
                }
                status.innerText = `DIALING SYSTEM VELOCITY: ${currentPlaybackRate.toFixed(2)}x`;
            } else {
                // Regular Touch Scratching Altering Timeline Position Directly
                const rotationFactor = 5.0; 
                trackPlayheadTime += angleDiff * rotationFactor;
                status.innerText = `SCRUBBING PLAYHEAD LOCATION`;
            }

            lastAngle = currentAngle;
            lastTouchTime = now;
        }

        function handleEnd() {
            if (!isInteracting) return;
            isInteracting = false; 
            
            // When letting go of standard scratch, instantly force playhead update
            if (!isFreeSpinMode && isPlaying) {
                currentPlaybackRate = targetPlaybackRate;
                updateAudioEngineNode();
            }
        }

        wheel.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);
        wheel.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
    </script>
</body>
</html>
