<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TP-7 DIY Pre-Rendered Reverse Emulator</title>
    <style>
        body {
            background-color: #161616;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .layout-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            transition: all 0.3s ease;
        }

        .container.mobile-mode {
            flex-direction: column-reverse;
            gap: 20px;
        }
        .container.mobile-mode .side-buttons {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 320px;
        }
        .container.mobile-mode button {
            min-width: 90px;
            padding: 10px 10px;
            font-size: 0.8rem;
        }

        .side-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            min-width: 120px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.1s;
        }
        button:active {
            background-color: #444;
        }
        button.active {
            background-color: #ff5500;
            border-color: #ff7733;
        }
        .wheel-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        #wheel {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, #2d2d2d 30%, #1a1a1a 70%, #0a0a0a 100%);
            border: 6px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            touch-action: none;
        }
        #marker {
            width: 16px;
            height: 16px;
            background-color: #ff5500;
            border-radius: 50%;
            position: absolute;
            top: 15px;
        }
        .tape-display {
            background-color: #000;
            border: 2px solid #333;
            border-radius: 6px;
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            letter-spacing: 2px;
            min-width: 160px;
            text-align: center;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
        }
        #status {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #666;
            font-family: monospace;
            text-align: center;
            max-width: 90%;
        }
        #fileInputContainer {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="layout-bar">
        <span>Screen Mode:</span>
        <button id="btnToggleLayout" style="min-width: auto; padding: 6px 12px; font-size: 0.8rem;">Switch to Mobile UI</button>
    </div>

    <div id="fileInputContainer">
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <div class="container" id="mainContainer">
        <div class="side-buttons">
            <button id="btnPlay">PLAY</button>
            <button id="btnPause">PAUSE</button>
            <button id="btnFF">FFWD</button>
            <button id="btnRW">REWIND</button>
            <button id="btnFree">FREE SPIN</button>
        </div>

        <div class="wheel-area">
            <div class="tape-display" id="timerDisplay">00:00.00</div>
            <div id="wheel">
                <div id="marker"></div>
            </div>
        </div>
    </div>

    <div id="status">Upload an audio track. Dual pre-rendered buffers active.</div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let forwardBuffer = null;
        let reverseBuffer = null;
        let currentSourceNode = null;
        
        let isPlaying = false;
        let currentPlaybackRate = 1.0;
        let targetPlaybackRate = 1.0;
        let isFreeSpinMode = false;
        let manualSpeedSetting = 1.0;
        let isCurrentlyReverseNode = false;
        
        let trackPlayheadTime = 0; 
        let wheelRotation = 0; 
        let lastAnimationFrameTime = performance.now();
        let nodeStartTimeContext = 0;
        let nodeStartTimePlayhead = 0;

        let isInteracting = false;
        let lastAngle = 0;
        let lastTouchTime = Date.now();

        const container = document.getElementById('mainContainer');
        const wheel = document.getElementById('wheel');
        const status = document.getElementById('status');
        const fileInput = document.getElementById('audioFile');
        const timerDisplay = document.getElementById('timerDisplay');
        
        const btnPlay = document.getElementById('btnPlay');
        const btnPause = document.getElementById('btnPause');
        const btnFF = document.getElementById('btnFF');
        const btnRW = document.getElementById('btnRW');
        const btnFree = document.getElementById('btnFree');
        const btnToggleLayout = document.getElementById('btnToggleLayout');

        btnToggleLayout.addEventListener('click', () => {
            container.classList.toggle('mobile-mode');
            btnToggleLayout.innerText = container.classList.contains('mobile-mode') ? "Switch to PC UI" : "Switch to Mobile UI";
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            status.innerText = "SYS: Allocating dual-memory tape reels...";
            
            const arrayBuffer = await file.arrayBuffer();
            forwardBuffer = await audioContext.decodeAudioData(arrayBuffer);
            
            // PRE-RENDER REVERSE BUFFER: Create an exact clone, then flip array structures
            const duration = forwardBuffer.duration;
            const sampleRate = forwardBuffer.sampleRate;
            const numChannels = forwardBuffer.numberOfChannels;
            
            reverseBuffer = audioContext.createBuffer(numChannels, forwardBuffer.length, sampleRate);
            
            for (let channel = 0; channel < numChannels; channel++) {
                const fwdData = forwardBuffer.getChannelData(channel);
                const revData = reverseBuffer.getChannelData(channel);
                for (let i = 0, len = forwardBuffer.length; i < len; i++) {
                    revData[i] = fwdData[len - 1 - i];
                }
            }
            
            status.innerText = "SYS: Mirrored reverse cache built successfully.";
            trackPlayheadTime = 0;
            if(isPlaying) updateAudioNodeEngine();
        });

        // Smart Hot-Swapping Engine
        function updateAudioNodeEngine() {
            if (!forwardBuffer) return;
            
            // Clean up running nodes
            if (currentSourceNode) {
                try { currentSourceNode.stop(); currentSourceNode.disconnect(); } catch(e){}
            }

            // Detect if rate calculation implies a direction swap
            const needsReverse = currentPlaybackRate < 0;
            
            currentSourceNode = audioContext.createBufferSource();
            
            if (needsReverse) {
                currentSourceNode.buffer = reverseBuffer;
                isCurrentlyReverseNode = true;
                // Target mirror position: Duration minus where we currently stand
                let mirrorTime = forwardBuffer.duration - trackPlayheadTime;
                if(mirrorTime < 0) mirrorTime = 0;
                nodeStartTimePlayhead = trackPlayheadTime;
                nodeStartTimeContext = audioContext.currentTime;
                currentSourceNode.start(0, mirrorTime);
            } else {
                currentSourceNode.buffer = forwardBuffer;
                isCurrentlyReverseNode = false;
                nodeStartTimePlayhead = trackPlayheadTime;
                nodeStartTimeContext = audioContext.currentTime;
                currentSourceNode.start(0, trackPlayheadTime);
            }

            currentSourceNode.connect(audioContext.destination);
            // Always feed absolute positive speeds to the native handler!
            currentSourceNode.playbackRate.setValueAtTime(Math.abs(currentPlaybackRate), audioContext.currentTime);
        }

        // Clock Render and Variable Motor Loop
        function animationLoop(now) {
            const deltaTime = (now - lastAnimationFrameTime) / 1000;
            lastAnimationFrameTime = now;

            if (isPlaying && forwardBuffer) {
                if (!isInteracting) {
                    // Smooth motor transitions
                    let oldRate = currentPlaybackRate;
                    currentPlaybackRate += (targetPlaybackRate - currentPlaybackRate) * 0.1;
                    
                    // Direction changes require hot-swapping buffers on the fly
                    if ((oldRate >= 0 && currentPlaybackRate < 0) || (oldRate < 0 && currentPlaybackRate >= 0)) {
                        updateAudioNodeEngine();
                    } else if (currentSourceNode) {
                        currentSourceNode.playbackRate.setValueAtTime(Math.abs(currentPlaybackRate), audioContext.currentTime);
                    }
                }

                // Track continuous timeline playhead position
                if (currentSourceNode && !isInteracting) {
                    const elapsedContextTime = audioContext.currentTime - nodeStartTimeContext;
                    if (isCurrentlyReverseNode) {
                        trackPlayheadTime = nodeStartTimePlayhead - (elapsedContextTime * Math.abs(currentPlaybackRate));
                    } else {
                        trackPlayheadTime = nodeStartTimePlayhead + (elapsedContextTime * Math.abs(currentPlaybackRate));
                    }
                } else {
                    trackPlayheadTime += deltaTime * currentPlaybackRate;
                }

                // Loop boundaries logic
                if (trackPlayheadTime < 0) trackPlayheadTime = forwardBuffer.duration;
                if (trackPlayheadTime > forwardBuffer.duration) trackPlayheadTime = 0;

                updateClockDisplay(trackPlayheadTime);

                const baseSpinSpeed = 2.5; 
                wheelRotation += baseSpinSpeed * currentPlaybackRate * deltaTime;
                wheel.style.transform = `rotate(${wheelRotation}rad)`;
            }

            requestAnimationFrame(animationLoop);
        }
        requestAnimationFrame(animationLoop);

        function updateClockDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            const hundredths = Math.floor((seconds % 1) * 100);
            timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${hundredths.toString().padStart(2, '0')}`;
        }

        btnPlay.addEventListener('click', () => {
            if (!forwardBuffer) return;
            audioContext.resume();
            isFreeSpinMode = false;
            btnFree.classList.remove('active');
            isPlaying = true;
            targetPlaybackRate = 1.0;
            updateAudioNodeEngine();
            status.innerText = "SYS: Playback Normal (1.0x)";
        });

        btnPause.addEventListener('click', () => {
            isPlaying = false;
            targetPlaybackRate = 0.0;
            currentPlaybackRate = 0.0;
            if (currentSourceNode) { try{currentSourceNode.stop();}catch(e){} }
            status.innerText = "SYS: Paused Motor";
        });

        btnFF.addEventListener('click', () => {
            if (!isPlaying) return;
            targetPlaybackRate = 3.0; 
            status.innerText = "SYS: Fast Forwarding (3.0x)";
        });

        btnRW.addEventListener('click', () => {
            if (!isPlaying) return;
            targetPlaybackRate = -2.0; 
            status.innerText = "SYS: Pre-rendered Reverse Triggered (-2.0x)";
        });

        btnFree.addEventListener('click', () => {
            if (!isPlaying) return;
            isFreeSpinMode = !isFreeSpinMode;
            if (isFreeSpinMode) {
                btnFree.classList.add('active');
                manualSpeedSetting = currentPlaybackRate;
                status.innerText = "MODE: Free Spin. Dial speed, click FREE SPIN again to LOCK.";
            } else {
                btnFree.classList.remove('active');
                targetPlaybackRate = manualSpeedSetting;
                updateAudioNodeEngine();
                status.innerText = `SYS: Locked motorized speed at ${targetPlaybackRate.toFixed(2)}x`;
            }
        });

        function getAngle(clientX, clientY) {
            const rect = wheel.getBoundingClientRect();
            return Math.atan2(clientY - (rect.top + rect.height / 2), clientX - (rect.left + rect.width / 2));
        }

        function handleStart(e) {
            if (!forwardBuffer || !isPlaying) return;
            audioContext.resume();
            isInteracting = true; 
            const touch = e.touches ? e.touches[0] : e;
            lastAngle = getAngle(touch.clientX, touch.clientY);
            lastTouchTime = Date.now();
        }

        function handleMove(e) {
            if (!isInteracting || !forwardBuffer) return;
            
            const touch = e.touches ? e.touches[0] : e;
            const currentAngle = getAngle(touch.clientX, touch.clientY);
            const now = Date.now();
            const deltaTime = (now - lastTouchTime) / 1000;

            if (deltaTime === 0) return;

            let angleDiff = currentAngle - lastAngle;
            if (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
            if (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;

            wheelRotation += angleDiff;
            wheel.style.transform = `rotate(${wheelRotation}rad)`;

            const angularVelocity = angleDiff / deltaTime;
            let oldRate = currentPlaybackRate;

            if (isFreeSpinMode) {
                manualSpeedSetting += (angularVelocity * 0.03);
                manualSpeedSetting = Math.max(-3.0, Math.min(4.0, manualSpeedSetting));
                currentPlaybackRate = manualSpeedSetting;
            } else {
                let scratchRate = angularVelocity * 0.20;
                currentPlaybackRate = Math.max(-4.0, Math.min(4.0, scratchRate));
            }

            // Scratch direction calculation checks
            if ((oldRate >= 0 && currentPlaybackRate < 0) || (oldRate < 0 && currentPlaybackRate >= 0)) {
                updateAudioNodeEngine();
            } else if (currentSourceNode) {
                currentSourceNode.playbackRate.setValueAtTime(Math.abs(currentPlaybackRate), audioContext.currentTime);
            }
            
            status.innerText = `HAND CONTROL: ${currentPlaybackRate.toFixed(2)}x`;

            lastAngle = currentAngle;
            lastTouchTime = now;
        }

        function handleEnd() {
            if (!isInteracting) return;
            isInteracting = false; 
            if (!isFreeSpinMode && isPlaying) {
                targetPlaybackRate = 1.0; 
                updateAudioNodeEngine();
            }
        }

        wheel.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);
        wheel.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
    </script>
</body>
</html>
